name: Deploy to Cloud Run

# Triggers:
#   - Push to main or the active development branch → automatic deploy
#   - Manual dispatch → run from any branch on demand
on:
  push:
    branches:
      - main
      - claude/daikin-gcp-automation-5okfl
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options: [production]

env:
  # ── Set these in GitHub → Settings → Secrets and variables → Actions ─────
  # Required secrets:
  #   GCP_PROJECT_ID                    e.g. my-gcp-project-123
  #   GCP_REGION                        e.g. europe-central2
  #   GCP_WORKLOAD_IDENTITY_PROVIDER    projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/POOL/providers/PROVIDER
  #   GCP_DEPLOY_SA                     deploy-sa@my-gcp-project-123.iam.gserviceaccount.com
  # Cloud Run runtime SA id must match GCP (default: daikin-runtime-sa; see setup/bootstrap.sh).
  # Optional secrets (override runtime behaviour):
  #   HEAT_TARGET_TEMP_C                default: 16
  #   HUMIDITY_HIGH_THRESHOLD           default: 70
  #   HUMIDITY_LOW_THRESHOLD            default: 60
  #   DRY_DURATION_MINUTES              default: 120
  #   LOG_LEVEL                         default: info
  #   AUTOMATION_ENABLED                default: true (set false/0/off/disabled to skip dry-start, dry-stop, check-humidity)
  #   DAIKIN_WRITE_CONCURRENCY          default: 1 (not wired in this YAML — set on Cloud Run if needed)
  #   DAIKIN_HTTP_PACE_MS               default: 75 in app (not wired here — override on Cloud Run for 429 tuning)
  # Optional notify (GitHub Environment secrets):
  #   NOTIFY_EMAIL, GMAIL_SENDER, GMAIL_OAUTH_CLIENT_ID, GMAIL_OAUTH_CLIENT_SECRET, GMAIL_REFRESH_TOKEN — Gmail API (all five to enable mail)
  #   NOTIFY_WEBHOOK_URL — HTTPS JSON webhook
  #   DAIKIN_RESTORE_COLLECTION — Firestore collection for pre-dry snapshots (default device_restore_state)
  # Browser /ops/scheduler (Firebase Auth + Scheduler API; optional in Environment gcp):
  #   FIREBASE_WEB_API_KEY — Firebase Console → Project settings → Your apps (Web API key; public)
  #   FIREBASE_AUTH_DOMAIN — optional (defaults to <PROJECT>.firebaseapp.com when unset in deploy env)
  #   FIREBASE_PROJECT_ID — optional if same as GCP project id (else override Firebase/GCP mismatch)
  #   ALLOWED_OPS_EMAILS — optional comma list for app-level allowlist
  #   SCHEDULER_REGION — optional override (default: europe-central2 or match GCP_REGION)
  #   SCHEDULER_CHECK_HUMIDITY_JOB_NAME — optional (default: daikin-check-humidity)

  SERVICE_NAME: daikin-humidity-control
jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    # Picks up secrets from Settings → Environments → gcp (not repository secrets).
    environment: gcp
    # Needed for Workload Identity Federation token request.
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Run tests before deploying ─────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # ── Authenticate to GCP via Workload Identity Federation ───────────────
      # Keyless: no long-lived service-account JSON key is stored in GitHub.
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # ── Build & push Docker image to Artifact Registry ─────────────────────
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/daikin/${{ env.SERVICE_NAME }}"
          TAG="${IMAGE}:${{ github.sha }}"
          LATEST="${IMAGE}:latest"

          docker build \
            --tag "$TAG" \
            --tag "$LATEST" \
            --label "git.sha=${{ github.sha }}" \
            --label "git.ref=${{ github.ref_name }}" \
            .

          docker push "$TAG"
          docker push "$LATEST"

          # Export for subsequent steps.
          echo "IMAGE_TAG=$TAG" >> "$GITHUB_ENV"

      # ── Deploy to Cloud Run ────────────────────────────────────────────────
      # Runtime env is YAML (avoids comma issues in gcloud --set-env-vars).
      - name: Deploy to Cloud Run
        env:
          HEAT_TARGET_TEMP_C: ${{ secrets.HEAT_TARGET_TEMP_C || '16' }}
          HUMIDITY_HIGH_THRESHOLD: ${{ secrets.HUMIDITY_HIGH_THRESHOLD || '70' }}
          HUMIDITY_LOW_THRESHOLD: ${{ secrets.HUMIDITY_LOW_THRESHOLD || '60' }}
          DRY_DURATION_MINUTES: ${{ secrets.DRY_DURATION_MINUTES || '120' }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL || 'info' }}
          DAIKIN_RESTORE_COLLECTION: ${{ secrets.DAIKIN_RESTORE_COLLECTION || 'device_restore_state' }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL || '' }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER || '' }}
          GMAIL_OAUTH_CLIENT_ID: ${{ secrets.GMAIL_OAUTH_CLIENT_ID || '' }}
          GMAIL_OAUTH_CLIENT_SECRET: ${{ secrets.GMAIL_OAUTH_CLIENT_SECRET || '' }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN || '' }}
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL || '' }}
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY || '' }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN || '' }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID || '' }}
          ALLOWED_OPS_EMAILS: ${{ secrets.ALLOWED_OPS_EMAILS || '' }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          SCHEDULER_REGION: ${{ secrets.SCHEDULER_REGION || secrets.GCP_REGION || 'europe-central2' }}
          SCHEDULER_CHECK_HUMIDITY_JOB_NAME: ${{ secrets.SCHEDULER_CHECK_HUMIDITY_JOB_NAME || 'daikin-check-humidity' }}
        run: |
          # OIDC audience must equal status.url from the API. That URL is not derivable from
          # project id/region alone (Cloud Run may use *.a.run.app hostnames). The app requires
          # a non-empty EXPECTED_AUDIENCE at startup, so: reuse the URL if the service already
          # exists; otherwise use a placeholder, then reconcile after deploy (see next step).
          EXISTING_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region="${{ secrets.GCP_REGION }}" \
            --format="value(status.url)" \
            --project="${{ secrets.GCP_PROJECT_ID }}" 2>/dev/null | xargs || true)
          if [ -n "${EXISTING_URL}" ]; then
            EXPECTED_AUDIENCE="${EXISTING_URL%/}"
          else
            EXPECTED_AUDIENCE="https://cloud-run-audience-bootstrap.invalid"
          fi
          export EXPECTED_AUDIENCE
          echo "DEPLOY_EXPECTED_AUDIENCE=${EXPECTED_AUDIENCE}" >> "$GITHUB_ENV"

          python3 <<'PY'
          import json
          import os

          pairs = [
              ("NODE_ENV", "production"),
              ("DAIKIN_TOKEN_STORE", "firestore"),
              ("DAIKIN_FIRESTORE_COLLECTION", "oauth_tokens"),
              ("DAIKIN_FIRESTORE_DOCUMENT", "daikin_onecta"),
              ("EXPECTED_AUDIENCE", os.environ["EXPECTED_AUDIENCE"]),
              ("HEAT_TARGET_TEMP_C", os.environ["HEAT_TARGET_TEMP_C"]),
              ("HUMIDITY_HIGH_THRESHOLD", os.environ["HUMIDITY_HIGH_THRESHOLD"]),
              ("HUMIDITY_LOW_THRESHOLD", os.environ["HUMIDITY_LOW_THRESHOLD"]),
              ("DRY_DURATION_MINUTES", os.environ["DRY_DURATION_MINUTES"]),
              ("LOG_LEVEL", os.environ["LOG_LEVEL"]),
              ("DAIKIN_RESTORE_COLLECTION", os.environ.get("DAIKIN_RESTORE_COLLECTION", "device_restore_state")),
              ("NOTIFY_EMAIL", os.environ.get("NOTIFY_EMAIL", "")),
              ("GMAIL_SENDER", os.environ.get("GMAIL_SENDER", "")),
              ("GMAIL_OAUTH_CLIENT_ID", os.environ.get("GMAIL_OAUTH_CLIENT_ID", "")),
              ("GMAIL_OAUTH_CLIENT_SECRET", os.environ.get("GMAIL_OAUTH_CLIENT_SECRET", "")),
              ("GMAIL_REFRESH_TOKEN", os.environ.get("GMAIL_REFRESH_TOKEN", "")),
              ("NOTIFY_WEBHOOK_URL", os.environ.get("NOTIFY_WEBHOOK_URL", "")),
              ("FIREBASE_WEB_API_KEY", os.environ.get("FIREBASE_WEB_API_KEY", "")),
              ("FIREBASE_AUTH_DOMAIN", os.environ.get("FIREBASE_AUTH_DOMAIN", "")),
              ("FIREBASE_PROJECT_ID", os.environ.get("FIREBASE_PROJECT_ID", "")),
              ("ALLOWED_OPS_EMAILS", os.environ.get("ALLOWED_OPS_EMAILS", "")),
              ("GOOGLE_CLOUD_PROJECT", os.environ.get("GOOGLE_CLOUD_PROJECT", "")),
              ("SCHEDULER_REGION", os.environ.get("SCHEDULER_REGION", "europe-central2")),
              (
                  "SCHEDULER_CHECK_HUMIDITY_JOB_NAME",
                  os.environ.get("SCHEDULER_CHECK_HUMIDITY_JOB_NAME", "daikin-check-humidity"),
              ),
          ]
          with open("cloud-run-env.yaml", "w", encoding="utf-8") as f:
              for key, val in pairs:
                  f.write(f"{key}: {json.dumps(val)}\n")
          PY

          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image="${{ env.IMAGE_TAG }}" \
            --region="${{ secrets.GCP_REGION }}" \
            --platform=managed \
            --allow-unauthenticated \
            --service-account="daikin-runtime-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com" \
            --env-vars-file=cloud-run-env.yaml \
            --set-secrets="DAIKIN_CLIENT_ID=DAIKIN_CLIENT_ID:latest,DAIKIN_CLIENT_SECRET=DAIKIN_CLIENT_SECRET:latest" \
            --project="${{ secrets.GCP_PROJECT_ID }}"

      # ── Set canonical EXPECTED_AUDIENCE (first deploy only needs reconcile) ─
      - name: Reconcile EXPECTED_AUDIENCE with Cloud Run URL
        run: |
          REAL_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region="${{ secrets.GCP_REGION }}" \
            --format="value(status.url)" \
            --project="${{ secrets.GCP_PROJECT_ID }}" | xargs)
          REAL_URL="${REAL_URL%/}"
          echo "SERVICE_URL=${REAL_URL}" >> "$GITHUB_ENV"
          echo "Cloud Run URL: ${REAL_URL}"
          if [ "${DEPLOY_EXPECTED_AUDIENCE}" != "${REAL_URL}" ]; then
            echo "Updating EXPECTED_AUDIENCE to canonical URL (bootstrap or URL format change)"
            gcloud run services update ${{ env.SERVICE_NAME }} \
              --region="${{ secrets.GCP_REGION }}" \
              --update-env-vars="^|^EXPECTED_AUDIENCE=${REAL_URL}" \
              --project="${{ secrets.GCP_PROJECT_ID }}"
          fi

      # ── Smoke test (public ingress: unauthenticated GET /health; /tasks still requires OIDC in-app)
      # Use /health not /healthz — Cloud Run's edge returns HTML 404 for /healthz before the container.
      - name: Smoke test /health
        run: |
          BASE_URL="${SERVICE_URL%/}"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${BASE_URL}/health")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Health check failed with HTTP $HTTP_STATUS (BASE_URL=${BASE_URL})"
            curl -sS "${BASE_URL}/health" || true
            exit 1
          fi
          echo "Health check passed (HTTP $HTTP_STATUS)"

      - name: Deployment summary
        run: |
          echo "### Deployment complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Service** | ${{ env.SERVICE_NAME }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`${{ env.IMAGE_TAG }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **URL** | ${{ env.SERVICE_URL }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | ${{ github.sha }} |" >> "$GITHUB_STEP_SUMMARY"
